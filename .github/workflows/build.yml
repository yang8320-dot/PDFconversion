name: Manual Build PDFconversion Portable

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名稱 (例如: v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download and Prep Poppler & EasyOCR Models
      shell: pwsh
      run: |
        # 1. 準備 Poppler
        Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip" -OutFile "poppler.zip"
        Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_temp"
        New-Item -ItemType Directory -Path "Library/poppler_bin" -Force
        Copy-Item -Path "poppler_temp/poppler-24.02.0/Library/bin/*" -Destination "Library/poppler_bin" -Recurse

        # 2. 準備 EasyOCR 離線模型 (修正 print 英文避免 CI 環境編碼錯誤)
        @"
        import easyocr
        import shutil
        import os
        print('Downloading EasyOCR models...')
        # 實例化 Reader 就會自動下載缺少的模型到預設路徑 (~/.EasyOCR/model)
        easyocr.Reader(['ch_tra', 'ch_sim', 'en'])
        
        # 將下載好的模型搬移到我們的打包資料夾 Library/model 內
        src = os.path.join(os.path.expanduser('~'), '.EasyOCR', 'model')
        dst = 'Library/model'
        shutil.copytree(src, dst, dirs_exist_ok=True)
        print('Models successfully copied to Library/model!')
        "@ > download_models.py
        
        python download_models.py

    - name: Build Executable (Portable Structure)
      run: |
        # 將所有相依套件放入 Library，主程式命名為 PDFconversion
        pyinstaller --noconfirm --onedir --noconsole `
          --contents-directory "Library" `
          --add-data "Library/poppler_bin;Library/poppler_bin" `
          --add-data "Library/model;Library/model" `
          --collect-all tkinterdnd2 `
          --collect-all customtkinter `
          --name "PDFconversion" `
          main.py

    - name: Package to Zip
      shell: pwsh
      run: |
        $VERSION = "${{ github.event.inputs.version_name }}"
        Compress-Archive -Path dist/PDFconversion/* -DestinationPath "PDFconversion_Portable_$VERSION.zip"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDFconversion_Portable_${{ github.event.inputs.version_name }}
        path: PDFconversion_Portable_${{ github.event.inputs.version_name }}.zip
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version_name }}
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
