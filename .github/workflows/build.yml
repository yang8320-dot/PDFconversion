name: Manual Build OCR Tool Portable

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名稱 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download and Prep Poppler
      run: |
        Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip" -OutFile "poppler.zip"
        Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_temp"
        
        New-Item -ItemType Directory -Path "Library/poppler_bin"
        Copy-Item -Path "poppler_temp/poppler-24.02.0/Library/bin/*" -Destination "Library/poppler_bin" -Recurse

    - name: Build Executable (Portable Structure)
      run: |
        # 加入 --collect-all tkinterdnd2 確保拖放功能的依賴檔正確被收集
        # --noconsole 取消背景黑色的終端機視窗，因為我們已經有完整的圖形化介面了
        pyinstaller --noconfirm --onedir --noconsole `
          --contents-directory "Library" `
          --add-data "Library/poppler_bin;Library/poppler_bin" `
          --collect-all tkinterdnd2 `
          --name "PDF_to_PPT_OCR" `
          main.py

    - name: Package to Zip
      shell: pwsh
      run: |
        $VERSION = "${{ github.event.inputs.version_name }}"
        Compress-Archive -Path dist/PDF_to_PPT_OCR/* -DestinationPath "PDF_to_PPT_OCR_Portable_$VERSION.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version_name }}
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
