name: Manual Build OCR Tool Portable

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名稱 (例如: v1.0.0)'
        required: true
        default: 'v1.0.0'

# 賦予 GitHub Actions 寫入權限 (給 Release 使用)
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download and Prep Poppler
      run: |
        # 下載 Poppler Windows 執行檔
        Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip" -OutFile "poppler.zip"
        Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_temp"
        
        # 建立 Library/poppler_bin 資料夾，並將檔案移入
        New-Item -ItemType Directory -Path "Library/poppler_bin"
        Copy-Item -Path "poppler_temp/poppler-24.02.0/Library/bin/*" -Destination "Library/poppler_bin" -Recurse

    - name: Build Executable (Portable Structure)
      run: |
        # 使用 PyInstaller 打包
        pyinstaller --noconfirm --onedir --noconsole `
          --contents-directory "Library" `
          --add-data "Library/poppler_bin;Library/poppler_bin" `
          --collect-all tkinterdnd2 `
          --name "PDF_to_PPT_OCR" `
          main.py

    - name: Package to Zip
      shell: pwsh
      run: |
        # 根據手動輸入的版本號命名壓縮檔
        $VERSION = "${{ github.event.inputs.version_name }}"
        Compress-Archive -Path dist/PDF_to_PPT_OCR/* -DestinationPath "PDF_to_PPT_OCR_Portable_$VERSION.zip"

    # ==========================================
    # 新增這段：將檔案上傳到 Actions 頁面的 Artifacts 區塊
    # ==========================================
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF_to_PPT_OCR_Portable_${{ github.event.inputs.version_name }}
        path: PDF_to_PPT_OCR_Portable_${{ github.event.inputs.version_name }}.zip
        retention-days: 90 # Artifact 預設保留天數 (最長 90 天)

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version_name }}
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
