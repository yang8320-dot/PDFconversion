name: Build3 PDFconversion Portable

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名稱 (例如: v2.0.3)'
        required: true
        default: 'v2.0.3'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    # 🚀 新增：安裝 UPX 壓縮工具
    - name: Install UPX for Executable Compression
      run: choco install upx

    - name: Download and Prep Poppler & EasyOCR Models
      shell: pwsh
      env:
        PYTHONIOENCODING: "utf8"
      run: |
        # 下載 Poppler
        Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip" -OutFile "poppler.zip"
        Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_temp"
        New-Item -ItemType Directory -Path "Library/poppler_bin" -Force
        Copy-Item -Path "poppler_temp/poppler-24.02.0/Library/bin/*" -Destination "Library/poppler_bin" -Recurse

        # 雲端自動下載 EasyOCR 模型
        @"
        import easyocr
        import shutil
        import os
        easyocr.Reader(['ch_tra', 'en'])
        src = os.path.join(os.path.expanduser('~'), '.EasyOCR', 'model')
        dst = 'Library/model'
        shutil.copytree(src, dst, dirs_exist_ok=True)
        "@ > download_models.py
        
        python download_models.py

    - name: Build Executable (Portable Structure)
      run: |
        # 🚀 新增：排除不必要的繪圖模組，並啟用 UPX 強制壓縮主程式 (避開 DLL 避免損壞)
        pyinstaller --noconfirm --onedir --noconsole `
          --contents-directory "Library" `
          --add-data "Library/poppler_bin;Library/poppler_bin" `
          --add-data "Library/model;Library/model" `
          --collect-all tkinterdnd2 `
          --collect-all customtkinter `
          --exclude-module matplotlib `
          --exclude-module IPython `
          --exclude-module pytest `
          --upx-exclude "*.dll" `
          --upx-exclude "*.pyd" `
          --name "PDFconversion" `
          main.py

    - name: Package to Zip
      shell: pwsh
      run: |
        $VERSION = "${{ github.event.inputs.version_name }}"
        Compress-Archive -Path dist/PDFconversion/* -DestinationPath "PDFconversion_Portable_$VERSION.zip"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDFconversion_Portable_${{ github.event.inputs.version_name }}
        path: PDFconversion_Portable_${{ github.event.inputs.version_name }}.zip

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version_name }}
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
