name: Fast Build PDFconversion Portable

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名稱 (例如: v2.0.1)'
        required: true
        default: 'v2.0.1'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    # ---------------------------------------------------------
    # 已經移除了 Poppler 與 EasyOCR 模型的下載步驟！
    # GitHub Action 會直接使用您儲存庫內已有的 Library 資料夾
    # ---------------------------------------------------------

    - name: Build Executable (Portable Structure)
      run: |
        # 使用 Pyinstaller 進行打包，將附屬元件收納至 Library
        pyinstaller --noconfirm --onedir --noconsole `
          --contents-directory "Library" `
          --add-data "Library/poppler_bin;Library/poppler_bin" `
          --add-data "Library/model;Library/model" `
          --collect-all tkinterdnd2 `
          --collect-all customtkinter `
          --name "PDFconversion" `
          main.py

    - name: Package to Zip
      shell: pwsh
      run: |
        $VERSION = "${{ github.event.inputs.version_name }}"
        Compress-Archive -Path dist/PDFconversion/* -DestinationPath "PDFconversion_Portable_$VERSION.zip"

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDFconversion_Portable_${{ github.event.inputs.version_name }}
        path: PDFconversion_Portable_${{ github.event.inputs.version_name }}.zip
        retention-days: 90

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version_name }}
        files: "*.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
